[project]
name = "gasket"
version = "0.1.0"
description = "Cloudflare Python Workers FFI boundary, checks, and deployment helpers"
requires-python = ">=3.12"
dependencies = ["httpx>=0.27"]

[project.scripts]
gasket = "gasket.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gasket"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
