name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall -q gasket
      - name: Import smoke
        run: |
          python - <<'PY'
          from gasket.ffi import SafeEnv, d1_null
          from gasket.adapters.scheduled import ScheduledEvent
          print(SafeEnv, d1_null(None), ScheduledEvent(cron="* * * * *", scheduled_time=0))
          PY
      - name: CLI smoke
        run: gasket doctor
