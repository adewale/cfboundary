name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Compile
        run: uv run python -m compileall -q cfboundary
      - name: Import smoke
        run: |
          uv run python - <<'PY'
          from cfboundary.ffi import d1_null, js_null, to_js, to_py
          from cfboundary.testing import patch_pyodide_runtime
          with patch_pyodide_runtime():
              assert d1_null() is js_null()
          assert to_py(to_js({"ok": True})) == {"ok": True}
          PY
      - name: Ruff
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest --cov=cfboundary --cov-branch --cov-report=term-missing --cov-fail-under=100
      - name: Build package
        run: uv build
