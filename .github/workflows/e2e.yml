name: Live E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed gasket live Worker URL"
        required: true
        type: string

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Run live E2E tests
        env:
          GASKET_E2E_BASE_URL: ${{ inputs.base_url }}
        run: uv run pytest tests/e2e -q
